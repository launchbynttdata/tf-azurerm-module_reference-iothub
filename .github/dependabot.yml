version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "weekly"
      ignore:
        - dependency-name: "hashicorp/*"
          update-types: ["version-update:semver-major"]
        - dependency-name: "microsoft/*"
          update-types: ["version-update:semver-major"]
        - dependency-name: "azure/*"
          update-types: ["version-update:semver-major"]
